name: Crypto Arbitrage Scanner

on:
  schedule:
    - cron: '*/15 * * * *'  # Har 15 minute me background me khud chalega
  workflow_dispatch:        # Isse aap khud manually button daba kar jab chahein run kar sakte hain

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install ccxt pandas tabulate

    - name: Execute Arbitrage Bot
      run: python bot.py
