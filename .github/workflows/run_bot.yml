name: Crypto Arbitrage Scanner

on:
  schedule:
    - cron: '*/5 * * * *'  # Auto trigger background cron loop every 5 minutes
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests pandas

    - name: Execute Arbitrage Bot
      run: python bot.py

    - name: Commit and Push live data.json
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data.json
        git commit -m "Automated dashboard live sync matrix update" || exit 0
        git push
